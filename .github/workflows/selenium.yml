name: Submit Form

on:
  workflow_dispatch:        # manual trigger only
    inputs:
      message:
        description: 'Message to send to the form'
        required: true
        default: 'Hello!'

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

- name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          # Tell Selenium exactly where chromium is
          echo "CHROME_BIN=$(which chromium-browser)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=$(which chromedriver)" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install gems
        run: gem install selenium-webdriver

      - name: Run Selenium script
        run: ruby script.rb
        env:
          SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
