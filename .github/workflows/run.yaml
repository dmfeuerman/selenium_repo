name: Run Selenium Scraper3
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest # This environment already has Chrome 146+ pre-installed
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # This speeds up Python dependency installs too

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Python Script
        run: python main.py
